<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador De Dezenas - Guinho Lotofácil</title>
    <style>
        /* --- ESTILO TERRARIA E SIMETRIA --- */
        body {
            background-image: linear-gradient(to bottom, #87CEEB, #228B22, #8B4513);
            background-attachment: fixed;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            user-select: none; /* Bloqueia seleção de texto */
        }

        .container {
            background-color: rgba(0, 0, 0, 0.85);
            border: 4px solid #5d4037;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            text-align: center;
            position: relative;
        }

        .header-title {
            color: #4caf50;
            text-shadow: 3px 3px #000;
            margin-bottom: 20px;
            font-size: 2.2rem;
        }

        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #ffeb3b; }
        
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 3px solid #8b4513;
            background: #fdf5e6;
            color: #333;
            border-radius: 5px;
            font-family: inherit;
            box-sizing: border-box;
            font-weight: bold;
        }

        textarea { height: 160px; resize: none; }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-bottom: 4px solid rgba(0,0,0,0.3);
            text-transform: uppercase;
            transition: 0.1s;
        }

        button:active { transform: translateY(3px); border-bottom: 0; }

        .btn-analyze { background-color: #4caf50; color: white; }
        .btn-clear { background-color: #f44336; color: white; }

        .results {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed #4caf50;
            text-align: left;
        }

        /* BOTÃO FLUTUANTE DE DOAÇÃO */
        .btn-donate {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #ffc107;
            color: #000;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            animation: pulse 2s infinite;
            z-index: 999;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* POPUP DE CARREGAMENTO (7 SEGUNDOS) */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-box { border: 4px solid #8b4513; background: #5d4037; padding: 40px; border-radius: 10px; text-align: center; }

        footer {
            margin-top: 40px;
            padding: 20px;
            color: #fff;
            font-size: 0.9rem;
            text-shadow: 1px 1px #000;
        }

        .highlight { color: #ffeb3b; font-size: 1.3rem; letter-spacing: 2px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="overlay">
    <div class="loader-box">
        <h2 style="color: #4caf50;">🔨 MINERANDO DADOS...</h2>
        <p>Analisando sorteios informados...</p>
        <div style="width: 50px; height: 50px; background: #4caf50; margin: 20px auto; animation: spin 1s infinite steps(4);"></div>
        <small>Aguarde 7 segundos para a análise ser concluída.</small>
    </div>
</div>

<div class="container">
    <div class="header-title">
        🌲 Analisador De Dezenas 🌲
    </div>

    <label>Selecione a Loteria:</label>
    <select id="loteria">
        <option value="Lotinha">Lotinha</option>
        <option value="Quininha">Quininha</option>
        <option value="Seninha">Seninha</option>
        <option value="Dia de Alegria">Dia de Alegria</option>
        <option value="LOTONANIAZINHA">LOTONANIAZINHA</option>
    </select>

    <label>Cole aqui os 10 sorteios (um por linha):</label>
    <textarea id="inputSorteios" placeholder="Exemplo:&#10;01 02 03 04...&#10;05 06 07 08..."></textarea>

    <div class="btn-group">
        <button class="btn-analyze" onclick="iniciarProcessamento()">Analisar Sorteios</button>
        <button class="btn-clear" onclick="limparTudo()">Limpar Tudo</button>
    </div>

    <div id="resultadoArea" class="results" style="display: none;">
        <h3 style="text-align: center; color: #4caf50;">📜 RELATÓRIO DO GUIA</h3>
        <p id="dezenasQuentes"></p>
        <p id="dezenasFrias"></p>
        <hr style="border: 1px solid #5d4037;">
        <h4 style="color: #ffeb3b; text-align: center;">💎 AS 15 MELHORES DEZENAS:</h4>
        <p id="sugestao" class="highlight" style="text-align: center;"></p>
        <p id="mensagemPorQue" style="font-size: 0.9rem; font-style: italic; opacity: 0.8; margin-top: 15px;"></p>
    </div>
</div>

<footer>
    Criado por <b>Guinho Lotofácil</b> &copy; 2024
</footer>

<a href="https://mpago.la/2gpGRjA" target="_blank" class="btn-donate">
    💰 Apoiar o Site
</a>

<script>
    /* PROTEÇÃO CONTRA CURIOSOS */
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };

    /* LÓGICA DE FUNCIONAMENTO */
    function iniciarProcessamento() {
        const input = document.getElementById('inputSorteios').value;
        if (!input.trim()) {
            alert("Por favor, introduza os sorteios primeiro!");
            return;
        }

        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('resultadoArea').style.display = 'none';

        setTimeout(() => {
            document.getElementById('overlay').style.display = 'none';
            executarAnaliseReal();
        }, 7000);
    }

    function executarAnaliseReal() {
        const texto = document.getElementById('inputSorteios').value;
        const loteria = document.getElementById('loteria').value;
        
        // Captura de números e formatação
        const números = texto.trim().split(/[\s,]+/).filter(n => n !== "").map(n => n.padStart(2, '0'));
        
        const frequencia = {};
        números.forEach(num => frequencia[num] = (frequencia[num] || 0) + 1);

        const ordenados = Object.keys(frequencia).sort((a, b) => frequencia[b] - frequencia[a]);

        const quentes = ordenados.slice(0, 5);
        const frias = ordenados.slice(-5);
        
        // --- ALTERAÇÃO AQUI: De 10 para 15 dezenas ---
        const sugestao = ordenados.slice(0, 15);

        document.getElementById('resultadoArea').style.display = 'block';
        document.getElementById('dezenasQuentes').innerHTML = `🔥 <b>Dezenas Quentes:</b> ${quentes.join(' - ')}`;
        document.getElementById('dezenasFrias').innerHTML = `❄️ <b>Dezenas Frias:</b> ${frias.join(' - ')}`;
        document.getElementById('sugestao').innerText = sugestao.join('   ');
        
        document.getElementById('mensagemPorQue').innerHTML = `
            <b>Por que estas dezenas?</b> Para a ${loteria}, estas 15 dezenas foram sugeridas com base no comportamento 
            dos 10 sorteios informados. Elas representam as tendências de maior saída, sendo ideais para compor novos jogos 
            estratégicos fundamentados em frequência.
        `;
    }

    function limparTudo() {
        document.getElementById('inputSorteios').value = '';
        document.getElementById('resultadoArea').style.display = 'none';
    }
</script>

</body>
</html>
